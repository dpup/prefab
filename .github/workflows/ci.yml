name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  build-test:
    name: Build & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      # The module is pure Go (the SQLite store uses modernc.org/sqlite), so it
      # builds and tests with CGO disabled.
      - name: Build
        env:
          CGO_ENABLED: "0"
        run: go build ./...

      - name: Vet
        run: go vet ./...

      - name: Test
        run: go test ./... -cover

      - name: Staticcheck
        run: go tool staticcheck ./...

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: v2.8.0
